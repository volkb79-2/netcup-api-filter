[mypy]
# Target the oldest supported Python (webhosting minimum).
# This catches Optional[X] vs X | None skew, missing stubs, etc.
python_version = 3.9

# Strict-ish settings appropriate for a Flask app codebase.
warn_return_any = True
warn_unused_ignores = True
ignore_missing_imports = True

# Source tree
files = src/netcup_api_filter
