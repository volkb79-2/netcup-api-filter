[pytest]
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto
pythonpath = . src
# Coverage is report-only for now (no --cov-fail-under gate yet); term-missing
# for humans, xml so CI can pick up coverage.xml as an artifact.
addopts = -x --tb=short --cov=src/netcup_api_filter --cov-report=term-missing --cov-report=xml
markers =
    installation: Fresh installation workflow tests (requires default credentials)
    e2e_local: E2E tests requiring local app deployment with mock services accessible (skip on production)
    live: Live-mode-only tests (require DEPLOYMENT_MODE=live and real external dependencies)
    ci_smoke: minimal E2E smoke subset run in GitHub Actions over plain HTTP
    smoke: Route-smoke and widget smoke tests (page-loads/status/element checks only)
    roundtrip: Independent-channel backend-truth tests (cross_role, dns crud, ddns round-trips)
    security: Auth, 2FA, recovery codes, IP allowlist, and attack attribution tests
    feature: Feature E2E tests (registration, email, backends, config, audit, etc.)
    journey: Stateful multi-step scenario suites (j1/j2/j3)
    nonfunctional: Accessibility and performance tests
    mock_selftest: Mock-service self-tests (test the mock, not the app)
    upstream_resilience: Tests verifying app behaviour when the upstream Netcup API returns bad or malformed responses
    accessibility: Accessibility-specific tests (subset of nonfunctional)
    performance: Performance-specific tests (subset of nonfunctional)
